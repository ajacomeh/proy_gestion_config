<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopAar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="container nav">
    <div class="logo">ShopAar</div>

    <nav>
      <ul class="menu">
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#productos">Productos</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

<section class="hero container" id="inicio">
  <div class="hero-text">
    <h1>Tienda moderna lista para crecer</h1>
    <p>
      Proyecto ecommerce escalable con HTML, CSS y JavaScript.
      Preparado para carrito, login, pagos y mejoras futuras.
    </p>
    <a href="#productos" class="btn">Ver productos</a>
  </div>

  <div class="hero-image">
  <img src="img/banner.jpg" alt="Portada tienda">
    </div>
</section>

<section class="products container" id="productos">
  <h2>Productos</h2>

  <div class="filters">
    <button class="active" data-filter="all">Todos</button>
    <button data-filter="ropa">Ropa</button>
    <button data-filter="tech">Tecnología</button>
    <button data-filter="hogar">Hogar</button>
  </div>

  <div class="grid" id="productGrid"></div>
</section>

</main>

<footer id="contacto">
  <div class="container">
    © 2026 ShopAar - Ecommerce Base
  </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
